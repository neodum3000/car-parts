    <title>Поиск автозапчастей</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 20px;
            background: #f0f2f5;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .parts-list {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            margin-bottom: 40px;
        }

        .part-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Контейнер для главного изображения с фиксированным соотношением сторон */
        .image-container {
            aspect-ratio: 4 / 3;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .part-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .thumbnails {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .thumbnail:hover {
            opacity: 1;
            border-color: #e74c3c;
        }

        .part-models {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .model-chip {
            background: #e9ecef;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .price {
            color: #2b8a3e;
            font-weight: bold;
            font-size: 1.2em;
            margin: 10px 0;
        }

        .part-notes {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.9em;
            border-radius: 4px;
            color: #856404;
        }

        .reference-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        .reference-section h2 {
            margin-bottom: 15px;
            color: #2b8a3e;
        }

        .engine-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .engine-code {
            font-weight: bold;
            color: #e74c3c;
        }

        .engine-models {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .engine-model-chip {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 0.8em;
        }
    </style>
</head>

        // ==================== ФУНКЦИИ ====================
        function initFilters() {
            const select = document.getElementById('modelSelect');
            database.models.forEach(model => {
                const option = document.createElement('option');
                option.value = model.code;
                option.textContent = model.name;
                select.appendChild(option);
            });
        }

        // Отображение карточек запчастей
        function showParts(parts) {
            const container = document.getElementById('partsContainer');
            container.innerHTML = '';

            if (parts.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666">Ничего не найдено</p>';
                return;
            }

            const fragment = document.createDocumentFragment();

            parts.forEach(part => {
                // Определяем массив изображений
                const images = part.images || (part.image ? [part.image] : []);
                const mainImage = images[0] || '';

                // Генерация миниатюр (если их больше одного)
                let thumbnailsHtml = '';
                if (images.length > 1) {
                    thumbnailsHtml = '<div class="thumbnails">';
                    images.forEach(img => {
                        thumbnailsHtml += `
                            <img src="${img}" 
                                 class="thumbnail" 
                                 loading="lazy"
                                 onclick="this.closest('.part-card').querySelector('.part-image').src='${img}'" 
                                 onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2260%22%20height%3D%2260%22%20viewBox%3D%220%200%2060%2060%22%3E%3Crect%20width%3D%2260%22%20height%3D%2260%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2210%22%20y%3D%2235%22%20font-family%3D%22Arial%22%20font-size%3D%2212%22%20fill%3D%22%23999%22%3E%D0%BD%D0%B5%D1%82%20%D1%84%D0%BE%D1%82%D0%BE%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        `;
                    });
                    thumbnailsHtml += '</div>';
                }

                const card = document.createElement('div');
                card.className = 'part-card';
                card.innerHTML = `
                    <div class="image-container">
                        <img src="${mainImage}" 
                             class="part-image" 
                             alt="${part.name}" 
                             loading="lazy"
                             onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2235%22%20y%3D%2280%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20fill%3D%22%23999%22%3E%D0%BD%D0%B5%D1%82%20%D1%84%D0%BE%D1%82%D0%BE%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    </div>
                    ${thumbnailsHtml}
                    <h3>${part.name}</h3>
                    <p>Артикул: ${part.article}</p>
                    <div class="price">${part.price.toLocaleString('ru-RU')} ₽</div>
                    ${part.notes ? `<div class="part-notes">📝 ${part.notes}</div>` : ''}
                    <div class="compatibility">
                        <p>Подходит для:</p>
                        <div class="part-models">
                            ${part.compatible.map(code => {
                                const model = database.models.find(m => m.code === code);
                                return model ? `<div class="model-chip">${model.name}</div>` : '';
                            }).join('')}
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            container.appendChild(fragment);
        }

        // Фильтрация с debounce (чтобы не дёргать на каждый символ)
        let filterTimeout;
        function filterParts() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                const selectedModel = document.getElementById('modelSelect').value;
                const searchText = document.getElementById('searchInput').value.toLowerCase();
                const selectedCategory = document.getElementById('categorySelect').value;

                const filtered = database.parts.filter(part => {
                    const matchesModel = !selectedModel || part.compatible.includes(selectedModel);
                    const matchesSearch = part.name.toLowerCase().includes(searchText) || 
                                       part.article.toLowerCase().includes(searchText);
                    const matchesCategory = !selectedCategory || part.category === selectedCategory;
                    return matchesModel && matchesSearch && matchesCategory;
                });

                showParts(filtered);
            }, 300); // ждём 300 мс после последнего ввода
        }

        // Справочник двигателей
        function showEngineReference() {
            const container = document.getElementById('engineReference');
            if (!container) return;
            container.innerHTML = database.engines.map(engine => `
                <div class="engine-card">
                    <div class="engine-code">Двигатель ${engine.code}</div>
                    <div>${engine.name}</div>
                    <div class="engine-models">
                        ${engine.models.map(code => {
                            const model = database.models.find(m => m.code === code);
                            return model ? `<span class="engine-model-chip">${model.name}</span>` : '';
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        // ==================== ЗАПУСК ====================
        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
            showEngineReference();
            // При изменении любого фильтра запускаем filterParts
            document.getElementById('modelSelect').addEventListener('change', filterParts);
            document.getElementById('searchInput').addEventListener('input', filterParts);
            document.getElementById('categorySelect').addEventListener('change', filterParts);
            filterParts(); // первое отображение
        });
    </script>
</body>
</html>
